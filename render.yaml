services:
  - type: web
    name: nexframe-films
    env: node
    plan: starter
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /api/deployment/validate
    autoDeploy: true
    disk:
      name: nexframe-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: COOKIE_SECURE
        value: "true"
      - key: NEXFRAME_AUTH_SECRET
        generateValue: true
      - key: NEXFRAME_ADMIN_EMAILS
        value: yankyfilms@gmail.com,solfamendez41@gmail.com,granoscar26@gmail.com
      - key: NEXFRAME_ADMIN_PASSWORD
        sync: false
      - key: PUBLIC_APP_URL
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: MUAPI_API_KEY
        sync: false
      - key: MUAPI_API_BASE_URL
        value: https://api.muapi.ai
      - key: MUAPI_WEBHOOK_SECRET
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: ELEVENLABS_API_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: PAYPAL_CLIENT_SECRET
        sync: false
